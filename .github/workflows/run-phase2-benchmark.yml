name: Phase 2 Benchmark

on:
  workflow_dispatch:
    inputs:
      scale:
        description: 'Dataset scale: debug (200k) / small (2M) / medium (10M)'
        required: true
        default: 'small'
        type: choice
        options: [debug, small, medium]

permissions:
  read-all

jobs:
  benchmark:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Java
        run: java -version

      - name: Install benchmark dependencies
        run: |
          pip install -U \
            "pandas>=2.2" \
            polars \
            duckdb \
            "pyspark>=3.5,<4.0" \
            faker \
            numpy \
            pyarrow \
            psutil
          python3 -c "import pandas, polars, duckdb, pyspark; print('pandas:', pandas.__version__, 'polars:', polars.__version__, 'duckdb:', duckdb.__version__, 'pyspark:', pyspark.__version__)"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set scale
        run: |
          python3 - << 'EOF'
          import pathlib, re
          scale = "${{ inputs.scale }}"
          rows = {"debug": 200_000, "small": 2_000_000, "medium": 10_000_000}[scale]
          p = pathlib.Path("scripts/phase2_benchmark.py")
          src = p.read_text()
          src = re.sub(r'N_ROWS\s*=\s*[\d_]+', 'N_ROWS = ' + str(rows), src, count=1)
          p.write_text(src)
          print(f"Scale={scale} N_ROWS={rows:,}")
          EOF

      - name: Run local benchmark (Pandas / Polars / DuckDB / PySpark local)
        run: |
          set -o pipefail
          python scripts/phase2_benchmark.py 2>&1 | tee benchmark_output.txt

      - name: Upload data to GCS for Dataproc
        run: |
          BUCKET="gs://tbd-2026l-325072-code"
          gsutil -m cp data/phase2_26L/group_08/events.parquet    $BUCKET/phase2/group_08/
          gsutil -m cp data/phase2_26L/group_08/dimension.parquet $BUCKET/phase2/group_08/
          gsutil cp scripts/spark_phase2_dataproc.py              $BUCKET/phase2/spark_phase2_dataproc.py
        continue-on-error: true

      - name: Submit PySpark job to Dataproc
        run: |
          gcloud dataproc jobs submit pyspark \
            gs://tbd-2026l-325072-code/phase2/spark_phase2_dataproc.py \
            --cluster=tbd-cluster \
            --region=europe-west1 \
            --project=tbd-2026l-325072 \
            2>&1 | tee dataproc_output.txt || true
        continue-on-error: true

      - name: Extract Dataproc results
        run: |
          grep "DATAPROC_RESULTS:" dataproc_output.txt 2>/dev/null \
            | sed 's/.*DATAPROC_RESULTS://' > dataproc_results.json \
            || echo '{}' > dataproc_results.json
          cat dataproc_results.json

      - name: Merge all results
        run: |
          python3 scripts/merge_results.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase2-benchmark-results
          path: |
            benchmark_results_final.json
            benchmark_output.txt
            dataproc_output.txt
          retention-days: 30
