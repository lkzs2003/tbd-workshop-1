name: Auto Destroy

on:
  # Trigger 1: run every day at 20:00 UTC to ensure resources are cleaned up
  schedule:
    - cron: '0 20 * * *'

  # Trigger 2: run when a PR is merged to master with [CLEANUP] in the title
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  read-all

jobs:
  auto-destroy:
    # For pull_request trigger: only run when the PR was actually merged
    # AND the PR title contains [CLEANUP]
    if: >
      github.event_name == 'schedule' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.title, '[CLEANUP]')
      )

    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.11.0

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Terraform Init
        id: init
        run: terraform init -backend-config=env/backend.tfvars

      - name: Terraform Destroy
        id: destroy
        run: terraform destroy -no-color -var-file env/project.tfvars -auto-approve
        continue-on-error: false
